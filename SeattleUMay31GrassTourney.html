<!DOCTYPE html>
<!-- KOB Viewer v2.18 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KOB Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --sans:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --t1:#1a1a18;--t2:#58584f;--t3:#9a9a90;--ti:#185fa5;--ts:#0f6e56;--tw:#993c1d;--tp:#6b3fa0;
  --bg1:#fff;--bg2:#f4f3ef;--bg3:#eceae4;--bgs:#e1f5ee;--bgp:#f0eaf8;
  --b3:rgba(26,26,24,.13);--b2:rgba(26,26,24,.25);--b1:rgba(26,26,24,.42);
  --bs:#0f6e56;--bp:#6b3fa0;--rm:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --t1:#f0efe8;--t2:#9a9a90;--t3:#68685f;--ti:#85b7eb;--ts:#5dcaa5;--tw:#f0997b;--tp:#c49ee8;
  --bg1:#1c1c1a;--bg2:#262623;--bg3:#2e2e2b;--bgs:#085041;--bgp:#2e1e45;
  --b3:rgba(240,239,232,.13);--b2:rgba(240,239,232,.25);--b1:rgba(240,239,232,.42);
  --bs:#5dcaa5;--bp:#c49ee8;
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg2);color:var(--t1);min-height:100vh;}
.page-hdr{background:var(--bg1);border-bottom:.5px solid var(--b3);padding:14px 20px;}
.page-hdr h1{font-size:17px;font-weight:600;}
.page-hdr span{font-size:12px;color:var(--t3);display:block;margin-top:2px;}
.page-main{max-width:900px;margin:0 auto;padding:20px 16px 60px;}
.card{background:var(--bg1);border:.5px solid var(--b3);border-radius:16px;padding:24px;}
.tabs{display:flex;gap:2px;border-bottom:.5px solid var(--b3);margin-bottom:20px;flex-wrap:wrap;}
.tab{background:transparent;border:.5px solid transparent;border-radius:8px 8px 0 0;padding:8px 16px;cursor:pointer;font-size:13px;font-family:var(--sans);color:var(--t2);margin-bottom:-.5px;}
.tab.active{background:var(--bg1);border-color:var(--b2);border-bottom-color:var(--bg1);color:var(--t1);}
/* nav rows */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.nav-l{display:flex;gap:6px;flex-wrap:wrap;}
.round-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.btn-sm{padding:5px 12px;font-size:12px;font-family:var(--sans);cursor:pointer;border-radius:6px;border:.5px solid var(--b2);background:var(--bg2);color:var(--t2);}
.btn-sm.sel,.btn-sm:hover{background:var(--bg3);color:var(--t1);}
.btn-sm.green{color:var(--ts);border-color:var(--bs);}
.btn-sm.green:hover{background:var(--bgs);}
.btn-xs{padding:3px 9px;font-size:11px;font-family:var(--sans);cursor:pointer;border-radius:6px;border:.5px solid var(--b2);background:var(--bg2);color:var(--t2);}
.btn-xs.sel,.btn-xs:hover{background:var(--bg3);color:var(--t1);}
/* progress */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.prog-lbl{font-size:12px;color:var(--t3);white-space:nowrap;}
.prog-wrap{flex:1;height:4px;background:var(--bg3);border-radius:2px;}
.prog-bar{height:4px;background:var(--ts);border-radius:2px;transition:width .3s;}
/* match table */
.net-table{border:.5px solid var(--b3);border-radius:var(--rl);overflow:hidden;}
.net-head,.net-row{display:grid;grid-template-columns:64px 1fr 70px 28px 70px 1fr;gap:4px;align-items:center;padding:7px 10px;}
.net-head{background:var(--bg2);font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
.net-row{border-top:.5px solid var(--b3);}
.net-row.alt{background:var(--bg2);}
.nnum{font-size:11px;color:var(--t3);font-family:var(--mono);}
.pair{display:flex;align-items:center;gap:4px;font-size:13px;}
.pa{color:var(--ti);}
.pb{color:var(--tp);}
.plus{color:var(--t3);font-size:11px;}
.vsc{font-size:11px;color:var(--t3);text-align:center;}
.score-in{width:64px;font-family:var(--mono);font-size:13px;text-align:center;padding:4px 6px;border:.5px solid var(--b3);border-radius:6px;background:var(--bg2);color:var(--t1);}
.score-in.win{border-color:var(--bs);background:var(--bgs);color:var(--ts);}
.score-in.lose{border-color:var(--b2);}
/* pool header */
.pool-hdr{font-size:12px;font-weight:600;color:var(--t2);padding:8px 10px;background:var(--bg2);border-radius:var(--rm);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.pool-badge{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--bgp);color:var(--tp);font-weight:600;}
/* standings */
.std-wrap{overflow-x:auto;}
.std-table{width:100%;border-collapse:collapse;font-size:13px;}
.std-table th{font-size:10px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;text-align:left;background:var(--bg2);border-bottom:.5px solid var(--b3);}
.std-table th.r,.std-table td.r{text-align:right;}
.std-table td{padding:8px 10px;border-bottom:.5px solid var(--b3);color:var(--t1);}
.std-table tr:last-child td{border-bottom:none;}
.std-table tr.alt td{background:var(--bg2);}
.rnk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:600;background:var(--bg2);color:var(--t2);}
.rnk.gold{background:#fef3c7;color:#92400e;}
.rnk.silver{background:#f3f4f6;color:#374151;}
.rnk.bronze{background:#fde8d8;color:#92400e;}
.gbadge{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--bg2);border:.5px solid var(--b3);color:var(--t2);}
.dpos{color:var(--ts);}
.dneg{color:var(--tw);}
.grp-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.fnote{font-size:11px;color:var(--t3);margin-top:10px;}
/* stats bar */
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
.stat{display:flex;flex-direction:column;}
.stat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
.stat-val{font-size:16px;font-weight:600;color:var(--t1);}
/* lookup */
.lookup-sel{font-family:var(--sans);font-size:13px;padding:5px 8px;border:.5px solid var(--b3);border-radius:var(--rm);background:var(--bg2);color:var(--t1);}
.lk-wrap{border:.5px solid var(--b3);border-radius:var(--rl);overflow:hidden;}
.lk-head,.lk-row{display:grid;grid-template-columns:60px 80px 1fr 28px 1fr 80px;gap:4px;align-items:center;padding:7px 10px;}
.lk-head{background:var(--bg2);font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
.lk-row{border-top:.5px solid var(--b3);}
.lk-row.alt{background:var(--bg2);}
/* bracket */
.bracket-wrap{overflow-x:auto;padding-bottom:8px;}
.bracket{display:flex;gap:0;align-items:flex-start;}
.bk-round{display:flex;flex-direction:column;min-width:160px;}
.bk-round-hdr{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:0 8px 8px;}
.bk-spacer{flex:1;}
.bk-match{border:.5px solid var(--b3);border-radius:var(--rm);background:var(--bg1);margin:0 8px 4px;}
.bk-match.bye{opacity:.5;}
.bk-match.complete{border-color:var(--bs);}
.bk-entry{padding:6px 10px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;min-height:32px;}
.bk-entry:first-child{border-bottom:.5px solid var(--b3);}
.bk-entry.winner{font-weight:600;color:var(--ts);}
.bk-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bk-score{font-family:var(--mono);font-size:12px;width:32px;text-align:center;padding:2px 4px;border:.5px solid var(--b3);border-radius:4px;background:var(--bg2);color:var(--t1);}
.bk-score.win{border-color:var(--bs);background:var(--bgs);color:var(--ts);}
.bk-connector{display:flex;flex-direction:column;justify-content:center;width:16px;margin-bottom:4px;}
.bk-connector svg{overflow:visible;}
.bk-group{display:flex;align-items:center;margin-bottom:8px;}
.bk-empty{font-size:12px;color:var(--t3);padding:12px 10px;text-align:center;}
.bk-section-hdr{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;padding:4px 0 8px;}
.seed-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg1);border:.5px solid var(--b3);border-radius:var(--rm);margin-bottom:4px;cursor:grab;user-select:none;transition:background .15s;}
.seed-item:active{cursor:grabbing;}
.seed-item.drag-over{background:var(--bg3);border-color:var(--b1);}
.seed-item.dragging{opacity:.4;}
.seed-num{font-size:11px;font-family:var(--mono);color:var(--t3);width:22px;flex-shrink:0;}
.seed-name{font-size:13px;color:var(--t1);}
.seed-handle{font-size:14px;color:var(--t3);flex-shrink:0;}
.bk-pick{font-size:10px;padding:2px 8px;border-radius:4px;border:.5px solid var(--b2);background:var(--bg2);color:var(--t2);cursor:pointer;font-family:var(--sans);flex-shrink:0;}
.bk-pick:hover{background:var(--bg3);color:var(--t1);}
.bk-pick.picked{background:var(--bgs);color:var(--ts);border-color:var(--bs);font-weight:600;}
/* pool standings section */
.pool-section{margin-bottom:20px;}
.pool-section-hdr{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid var(--b3);}
/* empty state */
.empty{padding:40px;text-align:center;color:var(--t3);}
@media(max-width:580px){
  .net-head,.net-row{grid-template-columns:28px 1fr 58px 22px 58px 1fr;padding:6px 6px;}
  .lk-head,.lk-row{grid-template-columns:44px 60px 1fr 22px 1fr 60px;}
  .bk-round{min-width:130px;}
  .card{padding:14px;}
}
</style>
</head>
<body>
<header class="page-hdr">
  <h1 id="page-title">KOB Viewer</h1>
  <span id="page-sub"></span>
</header>
<main class="page-main">
<div class="card">
  <div class="tabs" id="tabs"></div>
  <div id="tab-schedule" style="display:none">
    <div id="stats-bar" class="stats"></div>
    <div class="nav-row"><div class="nav-l" id="week-btns"></div><div class="nav-r"><button class="btn-sm green" onclick="exportXLSX()">Export .xlsx</button></div></div>
    <div class="round-row" id="round-btns"></div>
    <div class="prog-row"><span class="prog-lbl" id="prog-lbl"></span><div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div></div>
    <div class="net-table" id="net-table"></div>
    <p class="fnote" id="fnote"></p>
  </div>
  <div id="tab-pools" style="display:none">
    <div class="nav-row"><div class="nav-l" id="pool-btns"></div><div class="nav-r"><button class="btn-sm green" onclick="exportXLSX()">Export .xlsx</button></div></div>
    <div class="round-row" id="pool-round-btns"></div>
    <div class="prog-row"><span class="prog-lbl" id="pool-prog-lbl"></span><div class="prog-wrap"><div class="prog-bar" id="pool-prog-bar" style="width:0%"></div></div></div>
    <div id="pool-table"></div>
  </div>
  <div id="tab-standings" style="display:none">
    <div class="grp-filter" id="std-filter"></div>
    <div class="std-wrap"><table class="std-table" id="std-table"></table></div>
    <p class="fnote" id="std-note"></p>
  </div>
  <div id="tab-bracket" style="display:none">
    <div class="nav-row" style="margin-bottom:14px;">
      <div id="bracket-sub-nav" class="nav-l"></div>
      <div style="display:flex;gap:6px;">
        <button class="btn-sm" onclick="seedBracket()" id="btn-seed-bracket">Seed from standings</button>
        <button class="btn-sm" onclick="toggleSeedEditor()" id="btn-edit-seeds" style="display:none">Edit seeds</button>
      </div>
    </div>
    <!-- Seed editor: draggable list, shown instead of bracket when editing -->
    <div id="seed-editor" style="display:none;margin-bottom:16px;">
      <p style="font-size:12px;color:var(--t2);margin-bottom:10px;">Drag entries to reorder seeds. Changes rebuild the bracket.</p>
      <div id="seed-list-wrap" style="max-width:320px;"></div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn-sm sel" onclick="confirmSeedEdit()">Confirm & rebuild</button>
        <button class="btn-sm" onclick="cancelSeedEdit()">Cancel</button>
      </div>
    </div>
    <div id="bracket-wrap"></div>
  </div>
  <div id="tab-lookup" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <label style="font-size:13px;color:var(--t2);">Player:</label>
      <select id="lookup-sel" class="lookup-sel" onchange="renderLookup()"></select>
    </div>
    <div id="lookup-res"></div>
  </div>
  <div id="tab-teams" style="display:none">
    <p style="font-size:13px;color:var(--t2);margin-bottom:14px;">Rename entries — display names update across all tabs instantly. Original names are preserved internally.</p>
    <div id="teams-rename-list" style="max-width:480px;"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn-sm sel" onclick="applyRenames()">Apply</button>
      <button class="btn-sm" onclick="resetRenames()">Reset to originals</button>
    </div>
  </div>
</div>
</main>
<script>
var SD = {"format":"traditional_tournament","title":"Tournament","courts":[{"name":"Court 1","session":"","pool":0},{"name":"Court 2","session":"","pool":1},{"name":"Court 3","session":"","pool":2}],"sessions":[],"scoring":{"mode":"sets","numSets":1,"scoreLimit":21},"config":{"bracketType":"double","byeRule":"auto_win","playoffMode":"everyone","numBrackets":2,"playoffQualifiers":null,"seedingMethod":"flat","seedsPerPool":2,"num-pools":3,"entries-per-pool":4,"courts-per-pool":1},"entries":["Lee","Mark L","Sautter","Sumeet","Justin L","Shaffi","Madison","Nikhil","Trinity","Khyu","David Y"],"pools":[{"name":"Pool A","entries":["Lee","Shaffi","Madison"],"rounds":[[{"p1":"Lee","p2":"Lee","isBye":true,"court":0},{"p1":"Shaffi","p2":"Madison","isBye":false,"court":0}],[{"p1":"Lee","p2":"Madison","isBye":false,"court":0},{"p1":"Shaffi","p2":"Shaffi","isBye":true,"court":0}],[{"p1":"Lee","p2":"Shaffi","isBye":false,"court":0},{"p1":"Madison","p2":"Madison","isBye":true,"court":0}],[{"p1":"Lee","p2":"Lee","isBye":true,"court":0},{"p1":"Shaffi","p2":"Madison","isBye":false,"court":0}],[{"p1":"Lee","p2":"Madison","isBye":false,"court":0},{"p1":"Shaffi","p2":"Shaffi","isBye":true,"court":0}],[{"p1":"Lee","p2":"Shaffi","isBye":false,"court":0},{"p1":"Madison","p2":"Madison","isBye":true,"court":0}]]},{"name":"Pool B","entries":["Mark L","Justin L","Nikhil","David Y"],"rounds":[[{"p1":"Mark L","p2":"David Y","isBye":false,"court":1},{"p1":"Justin L","p2":"Nikhil","isBye":false,"court":1}],[{"p1":"Mark L","p2":"Nikhil","isBye":false,"court":1},{"p1":"David Y","p2":"Justin L","isBye":false,"court":1}],[{"p1":"Mark L","p2":"Justin L","isBye":false,"court":1},{"p1":"Nikhil","p2":"David Y","isBye":false,"court":1}]]},{"name":"Pool C","entries":["Sautter","Sumeet","Trinity","Khyu"],"rounds":[[{"p1":"Sautter","p2":"Khyu","isBye":false,"court":2},{"p1":"Sumeet","p2":"Trinity","isBye":false,"court":2}],[{"p1":"Sautter","p2":"Trinity","isBye":false,"court":2},{"p1":"Khyu","p2":"Sumeet","isBye":false,"court":2}],[{"p1":"Sautter","p2":"Sumeet","isBye":false,"court":2},{"p1":"Trinity","p2":"Khyu","isBye":false,"court":2}]]}],"bracket":{"type":"double","seedsAdv":4,"seedingMethod":"flat","seedsPerPool":2,"size":16,"matchupSeeds":[[1,16],[8,9],[4,13],[5,12],[2,15],[7,10],[3,14],[6,11]]}};
var scores = {};   // key->{s1,s2} for all formats
// allBrackets[i] = {name, seeds, rounds} -- one per Gold/Silver/etc
var allBrackets = [];
var selPool=0, selRound=0, selWeek=0, selLgRound=0, gf='all', selBracket=0;
var fmt='kob_league';
var nameMap={};  // originalName -> displayName

function dn(name){
  // Display name: use nameMap if set, else original
  return nameMap[name]||name;
}
function initNameMap(){
  // Build nameMap from all entries in SD, defaulting to original name
  nameMap={};
  if(SD.entries) SD.entries.forEach(function(e){ if(!nameMap[e]) nameMap[e]=e; });
  else if(SD.pools) SD.pools.forEach(function(pool){ pool.entries.forEach(function(e){ if(!nameMap[e]) nameMap[e]=e; }); });
  else if(SD.gA){ SD.gA.forEach(function(e){nameMap[e]=e;}); SD.gB.forEach(function(e){nameMap[e]=e;}); }
}

/* -- Tabs -- */
function buildTabs(tabDefs){
  var h='';
  tabDefs.forEach(function(t,i){
    h+='<button class="tab'+(i===0?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>';
  });
  document.getElementById('tabs').innerHTML=h;
}
function switchTab(t){
  var allTabs=['schedule','pools','standings','bracket','lookup','teams'];
  allTabs.forEach(function(x){
    var el=document.getElementById('tab-'+x);
    if(el) el.style.display=x===t?'':'none';
  });
  document.querySelectorAll('.tab').forEach(function(b){
    b.classList.toggle('active', b.textContent.toLowerCase()===t||b.getAttribute('onclick').indexOf("'"+t+"'")>=0);
  });
  if(t==='standings') renderStandings();
  if(t==='bracket') renderBracket();
  if(t==='lookup') renderLookupSelect();
  if(t==='teams') renderTeamsTab();
}

/* =======================================================
   KOB LEAGUE
======================================================= */
function initKOBLeague(){
  var sd=SD;
  buildTabs([{id:'schedule',label:'Schedule'},{id:'standings',label:'Standings'},{id:'lookup',label:'Player lookup'}]);
  document.getElementById('page-sub').textContent=sd.weeks+'w . '+(sd.roundsPerWeek||5)+'r/w . '+sd.courts.length+' courts . '+sd.gA.length+'+'+sd.gB.length+' players';
  var sb=document.getElementById('stats-bar');
  var total=sd.weeks*(sd.roundsPerWeek||5)*sd.courts.length;
  var sbHtml='<div class="stat"><div class="stat-lbl">Total matches</div><div class="stat-val">'+total+'</div></div>';
  if(sd.stats) sbHtml+='<div class="stat"><div class="stat-lbl">Repeat partners</div><div class="stat-val">'+sd.stats.rp+'</div></div><div class="stat"><div class="stat-lbl">Repeat matchups</div><div class="stat-val">'+sd.stats.mp+'</div></div>';
  sb.innerHTML=sbHtml;
  document.getElementById('tab-schedule').style.display='';
  renderLgSchedule();
}
function renderLgSchedule(){
  var sd=SD;
  var weeks=sd.weeks||sd.sched.length;
  var roundsPerWeek=sd.roundsPerWeek||sd.sched[0].length;
  var wb='';
  for(var w=0;w<weeks;w++) wb+='<button class="btn-sm'+(w===selWeek?' sel':'')+'" onclick="selWeek='+w+';selLgRound=0;renderLgSchedule()">Week '+(w+1)+'</button>';
  document.getElementById('week-btns').innerHTML=wb;
  var rb='';
  for(var r=0;r<roundsPerWeek;r++) rb+='<button class="btn-xs'+(r===selLgRound?' sel':'')+'" onclick="selLgRound='+r+';renderLgSchedule()">Round '+(r+1)+'</button>';
  document.getElementById('round-btns').innerHTML=rb;
  var round=sd.sched[selWeek][selLgRound];
  var rows='<div class="net-head"><span>Net</span><span>Pair 1</span><span style="text-align:center">Score</span><span></span><span style="text-align:center">Score</span><span>Pair 2</span></div>';
  for(var i=0;i<round.length;i++){
    var m=round[i], key=selWeek+'-'+selLgRound+'-'+i;
    var sc=scores[key]||{s1:'',s2:''};
    var s1n=parseInt(sc.s1),s2n=parseInt(sc.s2);
    var has=sc.s1!==''&&sc.s2!==''&&!isNaN(s1n)&&!isNaN(s2n);
    var c1=has?(s1n>s2n?'win':s1n<s2n?'lose':''):'';
    var c2=has?(s2n>s1n?'win':s2n<s1n?'lose':''):'';
    rows+='<div class="net-row'+(i%2?' alt':'')+'">' +
      '<span class="nnum">'+(sd.courts[i%sd.courts.length]?sd.courts[i%sd.courts.length].name:i+1)+'</span>' +
      '<span class="pair"><span class="pa">'+m.p1[0]+'</span><span class="plus">+</span><span class="pb">'+m.p1[1]+'</span></span>' +
      '<input type="number" min="0" max="99" class="score-in '+c1+'" value="'+sc.s1+'" oninput="onLgScore('+selWeek+','+selLgRound+','+i+',0,this.value)">' +
      '<span class="vsc">vs</span>' +
      '<input type="number" min="0" max="99" class="score-in '+c2+'" value="'+sc.s2+'" oninput="onLgScore('+selWeek+','+selLgRound+','+i+',1,this.value)">' +
      '<span class="pair"><span class="pa">'+m.p2[0]+'</span><span class="plus">+</span><span class="pb">'+m.p2[1]+'</span></span>' +
      '</div>';
  }

  document.getElementById('pool-prog-bar').style.width=total?Math.round(done/total*100)+'%':'0%';

function calcPoolStandings(poolIdx){
  var sd=SD, pool=sd.pools[poolIdx];
  var players={};
  pool.entries.forEach(function(e){players[e]={name:e,w:0,l:0,t:0,pf:0,pa:0,gp:0};});
  pool.rounds.forEach(function(round,ri){round.forEach(function(m,mi){
    if(m.isBye) return;
    var sc=scores['p'+poolIdx+'-r'+ri+'-m'+mi];
    if(!sc||sc.s1===''||sc.s2==='') return;
    var s1=parseInt(sc.s1),s2=parseInt(sc.s2);
    if(isNaN(s1)||isNaN(s2)) return;
    players[m.p1].pf+=s1; players[m.p1].pa+=s2; players[m.p1].gp++;
    players[m.p2].pf+=s2; players[m.p2].pa+=s1; players[m.p2].gp++;
    if(s1>s2){players[m.p1].w++;players[m.p2].l++;}
    else if(s2>s1){players[m.p2].w++;players[m.p1].l++;}
    else{players[m.p1].t++;players[m.p2].t++;}
  });});
  // Attach per-game coefficients for cross-pool fairness
  Object.values(players).forEach(function(p){
    p.winRate=p.gp>0?p.w/p.gp:0;
    p.diffPerGame=p.gp>0?(p.pf-p.pa)/p.gp:0;
    p.pfPerGame=p.gp>0?p.pf/p.gp:0;
  });
  return Object.values(players).sort(sortByCoeff);
}
function sortByCoeff(a,b){
  // Primary: win rate; Secondary: point diff per game; Third: PF per game
  if(Math.abs(b.winRate-a.winRate)>0.0001) return b.winRate-a.winRate;
  if(Math.abs(b.diffPerGame-a.diffPerGame)>0.0001) return b.diffPerGame-a.diffPerGame;
  return b.pfPerGame-a.pfPerGame;
}
// ── Double/Single elimination bracket ────────────────────────────────────────
function lRoundSizes(sz){
  // Returns match counts per L round for a DE bracket of size sz
  var wNR=Math.log2(sz);
  if(wNR<=1) return [];
  var sizes=[], s=sz/4;
  for(var i=0;i<2*(wNR-1);i++){
    sizes.push(Math.max(1,s));
    if(i%2===1&&s>1) s=Math.floor(s/2);
  }
  return sizes;
}
function buildWRounds(seeds){
  var sz=1; while(sz<seeds.length) sz*=2;
  var wNR=Math.log2(sz), wRounds=[];
  var r0=[];
  for(var i=0;i<sz/2;i++){
    var p1=seeds[i]||null, p2=seeds[sz-1-i]||null;
    var bye=!p1||!p2;
    r0.push({p1:p1||(p2||'TBD'),p2:bye?null:p2,isBye:bye,winner:bye?(p1||p2):null,matchNum:0,court:null});
  }
  wRounds.push(r0);
  for(var r=1;r<wNR;r++){
    var round=[];
    for(var j=0;j<wRounds[r-1].length/2;j++)
      round.push({p1:null,p2:null,isBye:false,winner:null,matchNum:0,court:null});
    wRounds.push(round);
  }
  // Auto-advance byes
  r0.forEach(function(m,mi){
    if(m.isBye&&m.winner&&wRounds[1]){
      var nmi=Math.floor(mi/2);
      if(mi%2===0) wRounds[1][nmi].p1=m.winner; else wRounds[1][nmi].p2=m.winner;
    }
  });
  return {wRounds:wRounds,sz:sz,wNR:wNR};
}
function seedBracket(){
  var sd=SD;
  var bracketType=sd.config.bracketType||'single';
  var method=sd.bracket.seedingMethod||'flat';
  var nb=sd.config.numBrackets||2;
  var bracketNames=['Gold','Silver','Bronze','Copper','Platinum','Diamond'];
  var allCourts=sd.courts||[];
  var numCourts=Math.max(allCourts.length,1);
  // Build seed list
  var allSeeds=[];
  if(method==='pool'){
    var totalEntries=sd.entries?sd.entries.length:0;
    var totalAdv=sd.config.playoffMode==='top-n'?(sd.config.playoffQualifiers||totalEntries):totalEntries;
    var seedsAdv=Math.max(1,Math.ceil(totalAdv/sd.pools.length));
    var byPool=sd.pools.map(function(p,pi){return calcPoolStandings(pi).slice(0,seedsAdv);});
    for(var s=0;s<seedsAdv;s++)
      for(var p=0;p<sd.pools.length;p++)
        if(byPool[p][s]) allSeeds.push(byPool[p][s].name);
  } else {
    var allPlayers={};
    sd.pools.forEach(function(pool,pi){
      calcPoolStandings(pi).forEach(function(p){ allPlayers[p.name]=p; });
    });
    allSeeds=Object.values(allPlayers).sort(sortByCoeff).map(function(p){return p.name;});
  }
  var total=allSeeds.length;
  var perBracket=Math.ceil(total/nb);
  allBrackets=[];
  var courtCounter=0;
  var globalMatchNum=1;
  for(var b=0;b<nb;b++){
    var slice=allSeeds.slice(b*perBracket,(b+1)*perBracket);
    if(!slice.length) break;
    var wb=buildWRounds(slice);
    var wRounds=wb.wRounds, sz=wb.sz, wNR=wb.wNR;
    // L bracket
    var lRounds=[], lNR=0;
    if(bracketType==='double'&&wNR>1){
      lNR=2*(wNR-1);
      var lSizes=lRoundSizes(sz);
      for(var lr=0;lr<lNR;lr++){
        var lRound=[];
        for(var j=0;j<lSizes[lr];j++)
          lRound.push({p1:null,p2:null,isBye:false,winner:null,matchNum:0,court:null});
        lRounds.push(lRound);
      }
    }
    var grandFinal={p1:null,p2:null,winner:null,matchNum:0};
    // Assign match numbers: W-R0, L-R0, W-R1, L-R1, L-R2, W-R2, L-R3, L-R4, ...
    function assignNum(m){
      if(!m.isBye){
        m.matchNum=globalMatchNum++;
        m.court=allCourts[courtCounter%numCourts]?allCourts[courtCounter%numCourts].name:'Court '+(courtCounter+1);
        courtCounter++;
      }
    }
    wRounds[0].forEach(assignNum);
    if(lRounds[0]) lRounds[0].forEach(assignNum);
    for(var r=1;r<wNR;r++){
      wRounds[r].forEach(assignNum);
      if(lRounds[2*r-1]) lRounds[2*r-1].forEach(assignNum);
      if(lRounds[2*r])   lRounds[2*r].forEach(assignNum);
    }
    if(bracketType==='double') grandFinal.matchNum=globalMatchNum++;
    var newBk={
      name:b<bracketNames.length?bracketNames[b]:'Bracket '+(b+1),
      seeds:slice, type:bracketType,
      wRounds:wRounds, lRounds:lRounds,
      grandFinal:grandFinal, sz:sz, wNR:wNR, lNR:lNR
    };
    markDeadLSlots(newBk);
    allBrackets.push(newBk);
  }
  var navEl=document.getElementById('bracket-sub-nav');
  if(navEl){
    var h='';
    allBrackets.forEach(function(bk,i){
      h+='<button class="btn-sm'+(i===selBracket?' sel':'')+'" onclick="selBracket='+i+';renderBracketNav();renderBracket()">'+bk.name+'</button>';
    });
    navEl.innerHTML=h;
  }
  document.getElementById('btn-seed-bracket').textContent='Re-seed brackets';
  var editBtn=document.getElementById('btn-edit-seeds');
  if(editBtn) editBtn.style.display='';
  renderBracket();
}
function markDeadLSlots(bk){
  if(!bk.lRounds.length) return;
  // Mark L-R1 slots whose source W-R1 match was a bye
  bk.wRounds[0].forEach(function(wm,wMi){
    if(!wm.isBye) return;
    var lMi=Math.floor(wMi/2);
    if(lMi>=bk.lRounds[0].length) return;
    var lm=bk.lRounds[0][lMi];
    if(wMi%2===0) lm.p1Dead=true; else lm.p2Dead=true;
  });
  // Propagate: both sides dead -> isEmpty, mark next-round input dead
  var changed=true;
  while(changed){
    changed=false;
    bk.lRounds.forEach(function(round,lRi){
      round.forEach(function(m,lMi){
        if(m.isEmpty) return;
        if(m.p1Dead&&m.p2Dead){
          m.isEmpty=true; m.isBye=true;
          var next=lRi+1;
          if(next>=bk.lRounds.length) return;
          if(lRi%2===0){
            if(lMi<bk.lRounds[next].length) bk.lRounds[next][lMi].p2Dead=true;
          } else {
            var nmi=Math.floor(lMi/2);
            if(nmi<bk.lRounds[next].length){
              if(lMi%2===0) bk.lRounds[next][nmi].p1Dead=true;
              else bk.lRounds[next][nmi].p2Dead=true;
            }
          }
          changed=true;
        }
      });
    });
  }
}
function autoAdvanceLIfNeeded(bk){
  // If one side of a L match is dead and the other is filled, auto-advance winner
  var changed=true;
  while(changed){
    changed=false;
    bk.lRounds.forEach(function(round,lRi){
      round.forEach(function(m,lMi){
        if(m.winner||m.isEmpty) return;
        var p1Real=m.p1&&m.p1!=='TBD';
        var p2Real=m.p2&&m.p2!=='TBD';
        if(p1Real&&m.p2Dead&&!p2Real){
          m.winner=m.p1; m.isBye=true;
          advanceInL(bk,lRi,lMi,m.p1);
          changed=true;
        } else if(p2Real&&m.p1Dead&&!p1Real){
          m.winner=m.p2; m.isBye=true;
          advanceInL(bk,lRi,lMi,m.p2);
          changed=true;
        }
      });
    });
  }
}
function dropToL(bk,wRi,wMi,loser){
  if(!bk.lRounds.length) return;
  if(wRi===0){
    var lMi=Math.floor(wMi/2);
    if(lMi<bk.lRounds[0].length){
      if(wMi%2===0) bk.lRounds[0][lMi].p1=loser; else bk.lRounds[0][lMi].p2=loser;
    }
  } else {
    var lRi=2*wRi-1;
    if(lRi<bk.lRounds.length&&wMi<bk.lRounds[lRi].length)
      bk.lRounds[lRi][wMi].p1=loser;
  }
  autoAdvanceLIfNeeded(bk);
}
function advanceInL(bk,lRi,lMi,winner){
  var next=lRi+1;
  if(next>=bk.lRounds.length){ bk.grandFinal.p2=winner; return; }
  if(lRi%2===0){
    if(lMi<bk.lRounds[next].length) bk.lRounds[next][lMi].p2=winner;
  } else {
    var nmi=Math.floor(lMi/2);
    if(nmi<bk.lRounds[next].length){
      if(lMi%2===0) bk.lRounds[next][nmi].p1=winner; else bk.lRounds[next][nmi].p2=winner;
    }
  }
}
function pickWinner(bi,side,ri,mi,winner){
  if(!allBrackets[bi]) return;
  var bk=allBrackets[bi];
  if(side==='W'){
    var m=bk.wRounds[ri][mi]; if(!m) return;
    var loser=m.p1===winner?m.p2:m.p1;
    if(m.winner===winner){ m.winner=null; clearWAdvanced(bk,ri,mi); }
    else {
      clearWAdvanced(bk,ri,mi); m.winner=winner;
      if(ri+1<bk.wRounds.length){ var nmi=Math.floor(mi/2); if(mi%2===0) bk.wRounds[ri+1][nmi].p1=winner; else bk.wRounds[ri+1][nmi].p2=winner; }
      else bk.grandFinal.p1=winner;
      if(loser) dropToL(bk,ri,mi,loser);
    }
  } else if(side==='L'){
    var m=bk.lRounds[ri][mi]; if(!m||m.isEmpty) return;
    if(m.winner===winner){ m.winner=null; clearLAdvanced(bk,ri,mi); }
    else { clearLAdvanced(bk,ri,mi); m.winner=winner; advanceInL(bk,ri,mi,winner); }
  } else if(side==='GF'){
    if(bk.grandFinal.winner===winner) bk.grandFinal.winner=null; else bk.grandFinal.winner=winner;
  }
  renderBracket();
}
function clearWAdvanced(bk,ri,mi){
  var m=bk.wRounds[ri][mi]; if(!m||!m.winner) return;
  var winner=m.winner, loser=m.p1===winner?m.p2:m.p1;
  if(ri+1<bk.wRounds.length){
    var nmi=Math.floor(mi/2), nm=bk.wRounds[ri+1][nmi];
    if(nm){ if(mi%2===0) nm.p1=null; else nm.p2=null; if(nm.winner){clearWAdvanced(bk,ri+1,nmi);nm.winner=null;} }
  } else {
    if(bk.grandFinal.p1===winner){ bk.grandFinal.p1=null; bk.grandFinal.winner=null; }
  }
  if(loser&&bk.lRounds.length) clearLoserFromL(bk,ri,mi,loser);
}
function clearLoserFromL(bk,wRi,wMi,loser){
  if(wRi===0){
    var lMi=Math.floor(wMi/2);
    if(lMi<bk.lRounds[0].length){
      var lm=bk.lRounds[0][lMi];
      if(wMi%2===0) lm.p1=null; else lm.p2=null;
      if(lm.winner&&!lm.isBye){clearLAdvanced(bk,0,lMi);lm.winner=null;}
    }
  } else {
    var lRi=2*wRi-1;
    if(lRi<bk.lRounds.length&&wMi<bk.lRounds[lRi].length){
      var lm=bk.lRounds[lRi][wMi]; lm.p1=null;
      if(lm.winner&&!lm.isBye){clearLAdvanced(bk,lRi,wMi);lm.winner=null;}
    }
  }
}
function clearLAdvanced(bk,lRi,lMi){
  var m=bk.lRounds[lRi][lMi]; if(!m||!m.winner||m.isBye) return;
  var next=lRi+1;
  if(next>=bk.lRounds.length){ bk.grandFinal.p2=null; bk.grandFinal.winner=null; return; }
  var nmi, nm;
  if(lRi%2===0){ nmi=lMi; nm=bk.lRounds[next][nmi]; if(nm){nm.p2=null;if(nm.winner&&!nm.isBye){clearLAdvanced(bk,next,nmi);nm.winner=null;}} }
  else { nmi=Math.floor(lMi/2); nm=bk.lRounds[next][nmi]; if(nm){if(lMi%2===0)nm.p1=null;else nm.p2=null;if(nm.winner&&!nm.isBye){clearLAdvanced(bk,next,nmi);nm.winner=null;}} }
}

       'ondrop="onSeedDrop(event,'+i+')" '+
       'ondragend="onSeedDragEnd(event)">'+
       '<span class="seed-handle">&#8597;</span>'+
       '<span class="seed-num">'+(i+1)+'</span>'+
       '<span class="seed-name">'+name+'</span>'+
       '</div>';
  });
  wrap.innerHTML=h;
}

function onSeedDragStart(e,idx){
  _dragSrcIdx=idx;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function onSeedDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function onSeedDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function onSeedDragEnd(e){ e.target.classList.remove('dragging'); }
function onSeedDrop(e,toIdx){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(_dragSrcIdx===null||_dragSrcIdx===toIdx) return;
  var bk=allBrackets[_editingBracketIdx]; if(!bk) return;
  // Reorder seeds array
  var seeds=bk.seeds.slice();
  var moved=seeds.splice(_dragSrcIdx,1)[0];
  seeds.splice(toIdx,0,moved);
  bk.seeds=seeds;
  _dragSrcIdx=null;
  buildSeedList(); // refresh numbers
}

function confirmSeedEdit(){
  var bk=allBrackets[_editingBracketIdx]; if(!bk) return;
  // Rebuild bracket from current seed order, preserving type and courts
  var sd=SD, allCourts=sd.courts||[], numCourts=Math.max(allCourts.length,1);
  var courtCounter=0;
  var globalMatchNum=1;
  // Recalculate match numbers for all brackets so they stay sequential
  allBrackets.forEach(function(b,bi){
    var wb=buildWRounds(b.seeds);
    b.wRounds=wb.wRounds; b.sz=wb.sz; b.wNR=wb.wNR;
    var lRounds=[], lNR=0;
    if(b.type==='double'&&b.wNR>1){
      lNR=2*(b.wNR-1);
      var lSizes=lRoundSizes(b.sz);
      for(var lr=0;lr<lNR;lr++){
        var lRound=[];
        for(var j=0;j<lSizes[lr];j++)
          lRound.push({p1:null,p2:null,isBye:false,winner:null,matchNum:0,court:null});
        lRounds.push(lRound);
      }
    }
    b.lRounds=lRounds; b.lNR=lNR;
    b.grandFinal={p1:null,p2:null,winner:null,matchNum:0};
    function assignNum(m){
      if(!m.isBye){
        m.matchNum=globalMatchNum++;
        m.court=allCourts[courtCounter%numCourts]?allCourts[courtCounter%numCourts].name:'Court '+(courtCounter+1);
        courtCounter++;
      }
    }
    b.wRounds[0].forEach(assignNum);
    if(b.lRounds[0]) b.lRounds[0].forEach(assignNum);
    for(var r=1;r<b.wNR;r++){
      b.wRounds[r].forEach(assignNum);
      if(b.lRounds[2*r-1]) b.lRounds[2*r-1].forEach(assignNum);
      if(b.lRounds[2*r])   b.lRounds[2*r].forEach(assignNum);
    }
    if(b.type==='double') b.grandFinal.matchNum=globalMatchNum++;
    markDeadLSlots(b);
  });
  cancelSeedEdit();
}

  document.getElementById('btn-edit-seeds').textContent='Edit seeds';

}

function renderBracket(){

      rows.push(['Round '+(ri+1)]);
      rows.push(['Court','P1a','P1b','Score','','Score','P2a','P2b']);
      round.forEach(function(m,ni){
        var sc=scores[wi+'-'+ri+'-'+ni]||{s1:'',s2:''};
        var court=sd.courts[ni%sd.courts.length]?sd.courts[ni%sd.courts.length].name:ni+1;
        rows.push([court,m.p1[0],m.p1[1],sc.s1,'-',sc.s2,m.p2[0],m.p2[1]]);
      });
      rows.push([]);
    });
    var ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:10},{wch:16},{wch:16},{wch:7},{wch:3},{wch:7},{wch:16},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws,'Week '+(wi+1));
  });
  var stRows=[['Rank','Player','Group','W','L','MP','PF','PA','+/-']];
  standings.forEach(function(p,i){stRows.push([i+1,p.name,p.grp,p.w,p.l,p.w+p.l,p.pf,p.pa,p.pf-p.pa]);});
  var stWs=XLSX.utils.aoa_to_sheet(stRows);stWs['!cols']=[{wch:5},{wch:18},{wch:7},{wch:5},{wch:5},{wch:6},{wch:7},{wch:7},{wch:7}];
  XLSX.utils.book_append_sheet(wb,stWs,'Standings');
  XLSX.writeFile(wb,(sd.title||'KOB')+'_Schedule.xlsx');
}
function exportTournXLSX(){
  var sd=SD,wb=XLSX.utils.book_new();
  // Summary
  var sumRows=[[sd.title||'Tournament'],[],['Pools',sd.pools.length],['Entries',sd.entries.length],['Courts',sd.courts.length]];
  var sw=XLSX.utils.aoa_to_sheet(sumRows);sw['!cols']=[{wch:20},{wch:20}];
  XLSX.utils.book_append_sheet(wb,sw,'Summary');
  // Pool sheets
  sd.pools.forEach(function(pool,pi){
    var rows=[[pool.name],[],['Entry 1','Score','Score','Entry 2','Court','Result']];
    pool.rounds.forEach(function(round,ri){
      rows.push(['Round '+(ri+1)]);
      round.forEach(function(m,mi){
        var sc=scores['p'+pi+'-r'+ri+'-m'+mi]||{s1:'',s2:''};
        var court=sd.courts[m.court]?sd.courts[m.court].name:(m.court+1);
        rows.push([m.p1,sc.s1,sc.s2,m.isBye?'BYE':m.p2,court,m.isBye?'BYE':((sc.s1!==''&&sc.s2!=='')?parseInt(sc.s1)>parseInt(sc.s2)?m.p1+' wins':m.p2+' wins':'')]);
      });
      rows.push([]);
    });
    // Pool standings
    rows.push(['Standings'],['Rank','Entry','W','L','PF','PA','+/-']);
    calcPoolStandings(pi).forEach(function(p,i){rows.push([i+1,p.name,p.w,p.l,p.pf,p.pa,p.pf-p.pa]);});
    var ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:18},{wch:7},{wch:7},{wch:18},{wch:10},{wch:20}];
    XLSX.utils.book_append_sheet(wb,ws,pool.name);
  });
  XLSX.writeFile(wb,(sd.title||'Tournament')+'_Schedule.xlsx');
}
