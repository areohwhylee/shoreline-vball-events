<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KOB Platform — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0f1a14;color:#e8f0eb;min-height:100vh;
  display:flex;align-items:center;justify-content:center;}
.card{background:#1a2e22;border:.5px solid #2d4a36;border-radius:12px;
  padding:40px;width:100%;max-width:400px;}
h1{font-size:22px;font-weight:700;margin-bottom:6px;color:#fff;}
.sub{font-size:13px;color:#7a9e82;margin-bottom:28px;}
label{font-size:12px;font-weight:600;color:#7a9e82;display:block;margin-bottom:5px;}
input{width:100%;padding:10px 12px;border-radius:7px;
  border:.5px solid #2d4a36;background:#0f1a14;color:#e8f0eb;
  font-size:14px;margin-bottom:16px;outline:none;}
input:focus{border-color:#3d8c5a;}
.btn{width:100%;padding:11px;border-radius:7px;border:none;
  background:#2e7d52;color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;margin-bottom:10px;}
.btn:hover{background:#3d8c5a;}
.btn-ghost{background:none;border:.5px solid #2d4a36;color:#7a9e82;}
.btn-ghost:hover{background:#1a2e22;color:#e8f0eb;}
.err{font-size:12px;color:#e57373;margin-bottom:12px;display:none;}
.toggle{font-size:13px;color:#7a9e82;text-align:center;margin-top:16px;}
.toggle a{color:#3d8c5a;cursor:pointer;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <h1>KOB Platform</h1>
  <p class="sub" id="sub-text">Sign in to manage your events</p>
  <div id="err" class="err"></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  <button class="btn" id="main-btn" onclick="doAuth()">Sign In</button>
  <button class="btn btn-ghost" onclick="window.location.href='dashboard.html'">Back</button>
  <div class="toggle">
    <span id="toggle-text">Don't have an account?</span>
    <a onclick="toggleMode()"> <span id="toggle-link">Sign up</span></a>
  </div>
</div>
<script>
const SUPABASE_URL='https://bdxsvlcojqmushnndaxz.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkeHN2bGNvanFtdXNobm5kYXh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTgyMTgsImV4cCI6MjA5NjQ5NDIxOH0.E7WEfw0GuQ8-iFFP6jpmDMEmDV2X24XJrI3AZ01Vnco';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
let mode='signin';

async function doAuth(){
  var email=document.getElementById('email').value.trim();
  var pw=document.getElementById('password').value;
  var errEl=document.getElementById('err');
  errEl.style.display='none';
  if(!email||!pw){errEl.textContent='Please fill in all fields.';errEl.style.display='block';return;}
  document.getElementById('main-btn').textContent='...';
  var res=mode==='signin'
    ?await sb.auth.signInWithPassword({email,password:pw})
    :await sb.auth.signUp({email,password:pw});
  if(res.error){
    errEl.textContent=res.error.message;
    errEl.style.display='block';
    document.getElementById('main-btn').textContent=mode==='signin'?'Sign In':'Create Account';
  } else {
    window.location.href='dashboard.html';
  }
}

function toggleMode(){
  mode=mode==='signin'?'signup':'signin';
  document.getElementById('main-btn').textContent=mode==='signin'?'Sign In':'Create Account';
  document.getElementById('sub-text').textContent=mode==='signin'?'Sign in to manage your events':'Create your organizer account';
  document.getElementById('toggle-text').textContent=mode==='signin'?'Don\'t have an account?':'Already have an account?';
  document.getElementById('toggle-link').textContent=mode==='signin'?'Sign up':'Sign in';
}

document.addEventListener('keydown',function(e){if(e.key==='Enter') doAuth();});

// Auto-redirect if already signed in
sb.auth.getUser().then(function(r){
  if(r.data.user) window.location.href='dashboard.html';
});
</script>
</body>
</html>
