<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KOB Platform — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0f1a14;color:#e8f0eb;min-height:100vh;}
header{background:#1a2e22;border-bottom:.5px solid #2d4a36;
  padding:14px 24px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:17px;font-weight:700;color:#fff;}
.hdr-right{display:flex;gap:10px;align-items:center;}
.email-lbl{font-size:12px;color:#7a9e82;}
.btn{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;}
.btn-green{background:#2e7d52;color:#fff;}
.btn-green:hover{background:#3d8c5a;}
.btn-ghost{background:none;border:.5px solid #2d4a36;color:#7a9e82;}
.btn-ghost:hover{color:#e8f0eb;background:#1a2e22;}
.btn-red{background:none;border:.5px solid #c62828;color:#e57373;}
main{max-width:860px;margin:32px auto;padding:0 20px;}
h2{font-size:18px;font-weight:700;margin-bottom:18px;}
.upload-area{border:1.5px dashed #2d4a36;border-radius:10px;
  padding:32px;text-align:center;margin-bottom:28px;cursor:pointer;}
.upload-area:hover{border-color:#3d8c5a;background:#1a2e22;}
.upload-area p{color:#7a9e82;font-size:14px;}
.upload-area strong{color:#3d8c5a;}
.event-grid{display:grid;gap:12px;}
.event-card{background:#1a2e22;border:.5px solid #2d4a36;border-radius:10px;
  padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.event-card:hover{border-color:#3d8c5a;}
.ev-title{font-size:15px;font-weight:600;margin-bottom:3px;}
.ev-meta{font-size:12px;color:#7a9e82;}
.ev-actions{display:flex;gap:8px;}
.tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;
  background:#2d4a36;color:#7a9e82;text-transform:uppercase;letter-spacing:.04em;}
.empty{text-align:center;color:#7a9e82;padding:40px 0;font-size:14px;}
#file-input{display:none;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  align-items:center;justify-content:center;z-index:100;}
.modal-bg.show{display:flex;}
.modal{background:#1a2e22;border:.5px solid #2d4a36;border-radius:12px;
  padding:28px;width:100%;max-width:420px;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal input{width:100%;padding:9px 12px;border-radius:7px;
  border:.5px solid #2d4a36;background:#0f1a14;color:#e8f0eb;
  font-size:13px;margin-bottom:12px;outline:none;}
.modal-btns{display:flex;gap:8px;margin-top:6px;}
.msg{font-size:12px;color:#7a9e82;margin-bottom:10px;}
</style>
</head>
<body>
<header>
  <span class="logo">KOB Platform</span>
  <div class="hdr-right">
    <span class="email-lbl" id="user-email"></span>
    <button class="btn btn-ghost" onclick="signOut()">Sign out</button>
  </div>
</header>

<main>
  <h2>My Events</h2>

  <!-- Upload area -->
  <div class="upload-area" onclick="document.getElementById('file-input').click()">
    <p>Drop a <strong>KOB Generator HTML file</strong> here, or click to upload</p>
    <p style="font-size:12px;margin-top:6px;color:#5a7a62;">Uploads your event to the cloud so players can view it live</p>
  </div>
  <input type="file" id="file-input" accept=".html" onchange="uploadEvent(this)">

  <!-- Event list -->
  <div class="event-grid" id="event-list">
    <div class="empty">Loading events...</div>
  </div>
</main>

<!-- Delete confirm modal -->
<div class="modal-bg" id="del-modal">
  <div class="modal">
    <h3>Delete event?</h3>
    <p class="msg">This permanently deletes the event, all scores and renames. Type the event title to confirm.</p>
    <input type="text" id="del-confirm-input" placeholder="Type event title...">
    <div class="modal-btns">
      <button class="btn btn-red" onclick="confirmDelete()">Delete</button>
      <button class="btn btn-ghost" onclick="closeDelModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://bdxsvlcojqmushnndaxz.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkeHN2bGNvanFtdXNobm5kYXh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTgyMTgsImV4cCI6MjA5NjQ5NDIxOH0.E7WEfw0GuQ8-iFFP6jpmDMEmDV2X24XJrI3AZ01Vnco';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
var user=null, pendingDeleteId=null, pendingDeleteTitle='';

// ── Auth guard ────────────────────────────────────────────────────────────────
sb.auth.getUser().then(function(r){
  if(!r.data.user){ window.location.href='auth.html'; return; }
  user=r.data.user;
  document.getElementById('user-email').textContent=user.email;
  loadEvents();
});

// ── Load events ───────────────────────────────────────────────────────────────
async function loadEvents(){
  var {data,error}=await sb.from('events')
    .select('id,title,format,created_at,is_public')
    .eq('owner_id',user.id)
    .order('created_at',{ascending:false});
  var list=document.getElementById('event-list');
  if(error||!data||!data.length){
    list.innerHTML='<div class="empty">No events yet. Upload a generator HTML file to get started.</div>';
    return;
  }
  list.innerHTML=data.map(function(ev){
    var fmt=(ev.format||'').replace(/_/g,' ');
    var date=new Date(ev.created_at).toLocaleDateString();
    var viewUrl='viewer.html?event='+ev.id;
    return '<div class="event-card">'+
      '<div>'+
        '<div class="ev-title">'+ev.title+'</div>'+
        '<div class="ev-meta">'+fmt+' &nbsp;·&nbsp; Created '+date+'</div>'+
      '</div>'+
      '<div class="ev-actions">'+
        '<span class="tag">'+(ev.is_public?'Public':'Private')+'</span>'+
        '<button class="btn btn-ghost" onclick="copyLink(\''+ev.id+'\')">Copy link</button>'+
        '<button class="btn btn-green" onclick="window.open(\''+viewUrl+'\')">Open</button>'+
        '<button class="btn btn-ghost" style="color:#e57373;border-color:#c62828" onclick="startDelete(\''+ev.id+'\',\''+ev.title.replace(/'/g,'')+'\')">Del</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ── Upload event HTML file ────────────────────────────────────────────────────
async function uploadEvent(input){
  var file=input.files[0]; if(!file) return;
  var text=await file.text();
  // Extract SD from the HTML file
  var m=text.match(/var SD = (\{[\s\S]*?\});/);
  if(!m){ alert('This doesn\'t look like a KOB viewer file. Make sure you\'re uploading a generated viewer HTML.'); return; }
  var sd;
  try{ sd=JSON.parse(m[1]); } catch(e){ alert('Could not parse schedule data: '+e.message); return; }

  var {data,error}=await sb.from('events').insert({
    owner_id: user.id,
    title: sd.title||file.name.replace('.html',''),
    format: sd.format||'unknown',
    sd_json: sd,
    admin_pin: sd.adminPin||null,
    is_public: true
  }).select().single();

  if(error){ alert('Upload failed: '+error.message); return; }
  input.value='';
  loadEvents();
}

// ── Copy shareable link ───────────────────────────────────────────────────────
function copyLink(id){
  var url=window.location.origin+window.location.pathname.replace('dashboard.html','viewer.html')+'?event='+id;
  navigator.clipboard.writeText(url).then(function(){
    alert('Link copied!\n\n'+url);
  });
}

// ── Delete ────────────────────────────────────────────────────────────────────
function startDelete(id,title){
  pendingDeleteId=id; pendingDeleteTitle=title;
  document.getElementById('del-confirm-input').value='';
  document.getElementById('del-modal').classList.add('show');
}
function closeDelModal(){ document.getElementById('del-modal').classList.remove('show'); }
async function confirmDelete(){
  var typed=document.getElementById('del-confirm-input').value.trim();
  if(typed!==pendingDeleteTitle){ alert('Title doesn\'t match.'); return; }
  await sb.from('events').delete().eq('id',pendingDeleteId);
  closeDelModal();
  loadEvents();
}

async function signOut(){
  await sb.auth.signOut();
  window.location.href='auth.html';
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
var uploadArea=document.querySelector('.upload-area');
uploadArea.addEventListener('dragover',function(e){e.preventDefault();uploadArea.style.borderColor='#3d8c5a';});
uploadArea.addEventListener('dragleave',function(){uploadArea.style.borderColor='#2d4a36';});
uploadArea.addEventListener('drop',function(e){
  e.preventDefault(); uploadArea.style.borderColor='#2d4a36';
  var f=e.dataTransfer.files[0];
  if(f){ var fake={files:[f],value:''}; uploadEvent(fake); }
});
</script>
</body>
</html>
